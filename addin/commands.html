<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <script>
    Office.onReady(() => {});

    /**
     * Called by the context menu "Demander à Claude".
     * Reads the current selection, stores it in localStorage,
     * then opens (or focuses) the taskpane.
     */
    function askClaudeFromContextMenu(event) {
      Word.run(async (context) => {
        const sel = context.document.getSelection();
        sel.load("text");
        await context.sync();
        const text = sel.text.trim();
        if (text) {
          localStorage.setItem("claude_pending_selection", text);
        }
      })
      .catch((err) => console.error("askClaudeFromContextMenu error:", err))
      .finally(() => event.completed());
    }
  </script>
</head>
<body></body>
</html>
