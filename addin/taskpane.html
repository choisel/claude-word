<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Assistant</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <link rel="stylesheet" href="taskpane.css" />
</head>
<body>
  <div id="app">

    <header>
      <span class="logo">Claude</span>
      <div class="header-right">
        <span id="doc-status" class="doc-status"></span>
        <span id="status-indicator" class="status-idle" title="Serveur local"></span>
      </div>
    </header>

    <section id="init-section">
      <div id="init-bar">
        <span id="init-label">Document non chargé</span>
        <button id="load-doc-btn" class="btn-secondary">Charger le document</button>
      </div>
    </section>

    <section id="selection-section">
      <label data-i18n="selectionLabel">Texte sélectionné</label>
      <div id="selection-preview">(sélectionnez du texte dans le document)</div>
      <button id="refresh-btn" class="btn-secondary">↻ Actualiser</button>
    </section>

    <section id="section-section">
      <label data-i18n="sectionTarget">Section ciblée <span class="hint" data-i18n="optional">(optionnel)</span></label>
      <div id="section-input-row">
        <input
          type="text"
          id="section-number"
          placeholder="ex: 1.2 ou Article 3"
        />
        <button id="clear-section-btn" class="btn-icon" title="Effacer">✕</button>
      </div>
    </section>

    <section id="chat-section">
      <div id="chat-history"></div>
    </section>

    <footer>
      <div id="input-area">
        <textarea
          id="question"
          placeholder="Posez votre question à Claude…"
          rows="3"
        ></textarea>
        <button id="ask-btn" class="btn-primary">Envoyer</button>
      </div>
      <div id="error-bar" class="hidden"></div>
    </footer>

  </div>

  <script src="taskpane.js"></script>
</body>
</html>
